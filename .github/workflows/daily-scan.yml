name: Daily passive scan

on:
  schedule:
    # 02:30 UTC every day (08:00 IST). Passive recon — no rate-limit risk.
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install passive-recon tooling
        run: sudo apt-get update && sudo apt-get install -y dnsutils

      - name: Run passive scan
        run: node scripts/scan.mjs --probe

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No data changes."
            exit 0
          fi
          git config user.name  "sanket-bot"
          git config user.email "sanket-bot@users.noreply.github.com"
          git add data/
          git commit -m "data: daily passive scan $(date -u +%Y-%m-%d)"
          git push
