name: Sanket daily passive checks

on:
  workflow_dispatch:
  schedule:
    # 09:00 IST daily.
    - cron: '30 3 * * *'

permissions:
  contents: write

concurrency:
  group: sanket-daily-passive-check
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run passive daily checks
        run: npm run checks:fresh

      - name: Validate build
        run: npm run build

      - name: Commit refreshed data
        run: |
          if [ -z "$(git status --short data)" ]; then
            echo "No Sanket data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Refresh Sanket daily passive checks"
          git push
